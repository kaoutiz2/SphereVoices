; Limites upload (vidéo / médiathèque). Pris en charge par Apache + PHP-FPM (ex. OVH).
; Après déploiement, attendre quelques minutes ou redémarrer PHP si les changements ne s’appliquent pas.
upload_max_filesize = 128M
post_max_size = 128M
max_execution_time = 300
max_input_time = 300
memory_limit = 512M
