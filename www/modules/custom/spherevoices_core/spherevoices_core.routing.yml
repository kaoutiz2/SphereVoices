# Stream vidéo fichier (MP4) : contourne les 404 Apache sur public:// avec espaces dans le nom.
spherevoices_core.inline_public_video:
  path: '/sv-video/{file}'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\InlinePublicVideoController::deliver'
  requirements:
    file: \d+
    _custom_access: '\Drupal\spherevoices_core\Controller\InlinePublicVideoController::access'

spherevoices_core.breaking_news:
  path: '/api/breaking-news'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\BreakingNewsController::getBreakingNews'
  methods: [GET]
  requirements:
    _access: 'TRUE'

# Liste des brèves (simple liste à puces) — remplace la vue page sur /breves.
spherevoices_core.breves:
  path: '/breves'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\BrevesController::page'
    _title_callback: '\Drupal\spherevoices_core\Controller\BrevesController::title'
  requirements:
    _permission: 'access content'

spherevoices_core.agenda:
  path: '/agenda'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\AgendaController::agendaPage'
    _title: 'Agenda des événements'
  requirements:
    _permission: 'access content'

spherevoices_core.poll_vote:
  path: '/api/poll/vote'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\PollController::vote'
  methods: [POST]
  requirements:
    _access: 'TRUE'

spherevoices_core.ads_settings:
  path: '/admin/config/spherevoices/ads'
  defaults:
    _form: '\Drupal\spherevoices_core\Form\AdsSettingsForm'
    _title: 'Publicités'
  requirements:
    _custom_access: '\Drupal\spherevoices_core\Form\AdsSettingsForm::access'
  options:
    _admin_route: TRUE

spherevoices_core.facebook_live_settings:
  path: '/admin/config/spherevoices/facebook-live'
  defaults:
    _form: '\Drupal\spherevoices_core\Form\FacebookLiveSettingsForm'
    _title: 'Lives (Facebook, Instagram, YouTube)'
  requirements:
    _custom_access: '\Drupal\spherevoices_core\Form\FacebookLiveSettingsForm::access'
  options:
    _admin_route: TRUE

spherevoices_core.live:
  # Use /en-direct so /live can remain a path alias → /en-direct (see admin form help).
  # A content page alias on /live would otherwise override this route.
  path: '/en-direct'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\LiveController::page'
    _title: 'Live'
  requirements:
    _permission: 'access content'

# URL canonique FR pour la page « Tendances » (grille des articles les plus lus).
spherevoices_core.trending:
  path: '/tendances'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\TrendingController::page'
    _title_callback: '\Drupal\spherevoices_core\Controller\TrendingController::title'
  requirements:
    _permission: 'access content'

# Ancien chemin /trending → redirection 301 vers /tendances (signets, anciens liens).
spherevoices_core.category:
  path: '/categorie/{category}'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\CategoryController::page'
    _title_callback: '\Drupal\spherevoices_core\Controller\CategoryController::title'
  requirements:
    _permission: 'access content'
    category: '^[a-z0-9\-]+$'

spherevoices_core.analytics_settings:
  path: '/admin/config/spherevoices/analytics'
  defaults:
    _form: '\Drupal\spherevoices_core\Form\AnalyticsSettingsForm'
    _title: 'Google Analytics & SEO'
  requirements:
    _custom_access: '\Drupal\spherevoices_core\Form\AnalyticsSettingsForm::access'
  options:
    _admin_route: TRUE

spherevoices_core.gallery_settings:
  path: '/admin/config/spherevoices/gallery'
  defaults:
    _form: '\Drupal\spherevoices_core\Form\GallerySettingsForm'
    _title: 'Galerie photo — page d''accueil'
  requirements:
    _custom_access: '\Drupal\spherevoices_core\Form\GallerySettingsForm::access'
  options:
    _admin_route: TRUE

spherevoices_core.mentions_legales:
  path: '/mentions-legales'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\LegalController::mentionsLegales'
    _title: 'Mentions légales'
  requirements:
    _permission: 'access content'

spherevoices_core.politique_cookies:
  path: '/politique-de-cookies'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\LegalController::politiqueCookies'
    _title: 'Politique de cookies'
  requirements:
    _permission: 'access content'

spherevoices_core.qui_sommes_nous:
  path: '/qui-sommes-nous'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\LegalController::quiSommesNous'
    _title: 'Qui sommes-nous ?'
  requirements:
    _permission: 'access content'

spherevoices_core.trending_legacy:
  path: '/trending'
  defaults:
    _controller: '\Drupal\spherevoices_core\Controller\TrendingController::legacyRedirect'
  requirements:
    _permission: 'access content'

